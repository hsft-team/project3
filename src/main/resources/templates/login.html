<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="eyebrow">Attendance Admin</div>
        <h1>관리자 로그인</h1>
        <p class="login-copy">출근 현황과 직원 정보를 한 곳에서 관리하세요.</p>

        <div class="alert error" th:if="${param.error}">
            로그인에 실패했습니다. 아래 안내를 확인해 주세요.
        </div>
        <div class="alert success" th:if="${param.logout}">
            로그아웃되었습니다.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                사번
                <input type="text" name="username" placeholder="ADMIN001" required>
            </label>
            <label>
                비밀번호
                <input type="password" name="password" placeholder="admin1234" required>
            </label>
            <button type="submit" class="primary-button">로그인</button>
        </form>

        <div class="login-help">
            백엔드 기본 관리자 계정: <strong>ADMIN001 / admin1234</strong>
        </div>
    </section>
</main>
<script th:if="${loginErrorMessage}" th:inline="javascript">
    alert([[${loginErrorMessage}]]);
</script>
</body>
</html>
