<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회사 위치 설정</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div>
            <div class="eyebrow">Attendance Admin</div>
            <h2>관리자 페이지</h2>
        </div>
        <nav class="nav-menu">
            <a th:href="@{/dashboard}">오늘 출근 현황</a>
            <a th:href="@{/employees}">직원 목록</a>
            <a th:href="@{/settings/location}" class="active">회사 위치 설정</a>
        </nav>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="secondary-button full-width">로그아웃</button>
        </form>
    </aside>

    <main class="content">
        <section class="page-header">
            <div>
                <div class="eyebrow">Settings</div>
                <h1>회사 위치 설정</h1>
            </div>
            <p>백엔드 DB의 회사 좌표와 출근 반경을 직접 관리합니다.</p>
        </section>

        <div class="alert success" th:if="${message}" th:text="${message}">저장되었습니다.</div>

        <section class="settings-layout">
            <article class="panel">
                <h2>현재 설정</h2>
                <div class="location-preview">
                    <p><strong>회사명</strong> <span th:text="${location.companyName()}">회사명</span></p>
                    <p><strong>좌표</strong>
                        <span th:text="${location.latitude()}">0</span>,
                        <span th:text="${location.longitude()}">0</span>
                    </p>
                    <p><strong>허용 반경</strong> <span th:text="${location.allowedRadiusMeters()}">0</span>m</p>
                    <p><strong>지각 기준</strong> <span th:text="${location.lateAfterTime()}">09:00</span></p>
                </div>
            </article>

            <article class="panel">
                <h2>위치 수정</h2>
                <form th:action="@{/settings/location}" th:object="${locationForm}" method="post" class="settings-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label>
                        회사명
                        <input type="text" th:field="*{companyName}" readonly>
                    </label>

                    <div class="form-row">
                        <label>
                            위도
                            <input type="number" step="0.000001" th:field="*{latitude}">
                            <small class="field-error" th:if="${#fields.hasErrors('latitude')}" th:errors="*{latitude}"></small>
                        </label>
                        <label>
                            경도
                            <input type="number" step="0.000001" th:field="*{longitude}">
                            <small class="field-error" th:if="${#fields.hasErrors('longitude')}" th:errors="*{longitude}"></small>
                        </label>
                    </div>

                    <label>
                        허용 반경(m)
                        <input type="number" th:field="*{allowedRadiusMeters}">
                        <small class="field-error" th:if="${#fields.hasErrors('allowedRadiusMeters')}" th:errors="*{allowedRadiusMeters}"></small>
                    </label>

                    <label>
                        지각 기준 시간
                        <input type="text" th:field="*{lateAfterTime}" readonly>
                    </label>

                    <button type="submit" class="primary-button">저장하기</button>
                </form>
            </article>
        </section>
    </main>
</div>
</body>
</html>
