<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 출근 현황</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div>
            <div class="eyebrow">Attendance Admin</div>
            <h2>관리자 페이지</h2>
        </div>
        <nav class="nav-menu">
            <a th:href="@{/dashboard}" class="active">오늘 출근 현황</a>
            <a th:href="@{/employees}">직원 목록</a>
            <a th:href="@{/settings/location}">회사 위치 설정</a>
        </nav>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="secondary-button full-width">로그아웃</button>
        </form>
    </aside>

    <main class="content">
        <section class="page-header">
            <div>
                <div class="eyebrow">Dashboard</div>
                <h1>오늘 출근 현황</h1>
            </div>
            <p>직원들의 출근 상태를 한눈에 확인할 수 있습니다.</p>
        </section>

        <section class="card-grid">
            <article class="stat-card">
                <span>전체 직원</span>
                <strong th:text="${summary.totalEmployees()}">0</strong>
            </article>
            <article class="stat-card">
                <span>정상 출근</span>
                <strong th:text="${summary.presentCount()}">0</strong>
            </article>
            <article class="stat-card warning">
                <span>지각</span>
                <strong th:text="${summary.lateCount()}">0</strong>
            </article>
            <article class="stat-card danger">
                <span>미출근</span>
                <strong th:text="${summary.absentCount()}">0</strong>
            </article>
            <article class="stat-card">
                <span>퇴근 완료</span>
                <strong th:text="${summary.checkedOutCount()}">0</strong>
            </article>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>실시간 출근 목록</h2>
                <span class="pill neutral" th:text="'총 ' + ${summary.totalEmployees()} + '명'">총 0명</span>
            </div>
            <table>
                <thead>
                <tr>
                    <th>사번</th>
                    <th>이름</th>
                    <th>권한</th>
                    <th>상태</th>
                    <th>출근 시간</th>
                    <th>퇴근 시간</th>
                    <th>메모</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="record : ${recentAttendances}">
                    <td th:text="${record.employeeCode()}">EMP001</td>
                    <td th:text="${record.employeeName()}">홍길동</td>
                    <td th:text="${record.role()}">EMPLOYEE</td>
                    <td>
                        <span class="pill"
                              th:text="${record.state().label}"
                              th:classappend="${record.state().name() == 'WORKING'} ? ' success' :
                                              (${record.state().name() == 'LATE'} ? ' warning' :
                                              (${record.state().name() == 'ABSENT'} ? ' danger' : ' neutral'))">
                            상태
                        </span>
                    </td>
                    <td th:text="${record.checkInTime()}">09:00</td>
                    <td th:text="${record.checkOutTime()}">18:00</td>
                    <td th:text="${record.note()}">메모</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
